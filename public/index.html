<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <script>
      // Track page load performance
      console.log('📄 [HTML] Document parsing started');
      window.pageStartTime = performance.now();
      
      // Log when DOM is loaded
      document.addEventListener('DOMContentLoaded', function() {
        console.log('✅ [HTML] DOM loaded in ' + performance.now().toFixed(2) + 'ms');
      });
      
      // Log when everything is loaded
      window.addEventListener('load', function() {
        console.log('✅ [HTML] Page fully loaded in ' + performance.now().toFixed(2) + 'ms');
        
        // Log performance metrics
        if (window.performance && window.performance.timing) {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          const connectTime = perfData.responseEnd - perfData.requestStart;
          const renderTime = perfData.domComplete - perfData.domLoading;
          
          console.log('📊 [PERF] Navigation to page load: ' + pageLoadTime + 'ms');
          console.log('📊 [PERF] Server response time: ' + connectTime + 'ms');
          console.log('📊 [PERF] DOM render time: ' + renderTime + 'ms');
        }
      });
    </script>
    
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/android-chrome-512x512.png" />
    
    <!-- Microsoft Windows Tiles -->
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/android-chrome-192x192.png" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />
    
    <title>tChart Constructor</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
      // Этот скрипт выполнится перед загрузкой main.js
      console.log('📦 [HTML] About to load React bundle...');
      window.bundleLoadStartTime = performance.now();
      
      // Отслеживаем загрузку всех скриптов
      const scripts = document.querySelectorAll('script[src]');
      scripts.forEach((script, index) => {
        console.log(`📜 [HTML] Script ${index + 1}: ${script.src.split('/').pop()}`);
      });
    </script>
  </body>
</html>
